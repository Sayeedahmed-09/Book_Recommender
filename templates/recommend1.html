<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookVerse - Get Recommendations</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0f0f1e;
            --secondary-bg: #1a1a2e;
            --card-bg: #16213e;
            --accent-primary: #e94560;
            --accent-secondary: #f39c12;
            --text-primary: #ffffff;
            --text-secondary: #b8bcc8;
            --border-color: rgba(233, 69, 96, 0.2);
            --transition-cubic: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, #1a1a2e 50%, var(--secondary-bg) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        nav {
            background: rgba(15, 15, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1.2rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-family: 'Crimson Text', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.3s var(--transition-cubic);
        }

        .navbar-brand:hover {
            transform: scale(1.05);
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s var(--transition-cubic);
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 5rem 2rem;
            position: relative;
            z-index: 1;
        }

        .header-section {
            margin-bottom: 4rem;
            text-align: center;
            animation: slideInDown 0.8s ease;
        }

        .header-title {
            font-family: 'Crimson Text', serif;
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -2px;
            line-height: 1.2;
        }

        .header-title-highlight {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .search-form {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.1) 0%, rgba(243, 156, 18, 0.05) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 4rem;
            animation: slideInUp 0.8s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .search-form h2 {
            color: var(--text-primary);
            font-family: 'Crimson Text', serif;
            font-size: 32px;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(233, 69, 96, 0.3);
            color: var(--text-primary);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-family: 'Sora', sans-serif;
            width: 100%;
        }

        .form-control::placeholder {
            color: rgba(184, 188, 200, 0.6);
        }

        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 0.2rem rgba(233, 69, 96, 0.25);
            color: var(--text-primary);
            outline: none;
        }

        .search-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s var(--transition-cubic);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
            position: relative;
            overflow: hidden;
        }

        .search-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .search-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.4);
        }

        .search-button:hover::before {
            left: 100%;
        }

        .search-button:active {
            transform: translateY(-1px);
        }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .navbar-container {
                flex-direction: column;
                gap: 1.5rem;
            }

            .nav-links {
                gap: 1.5rem;
                font-size: 12px;
            }

            .header-title {
                font-size: 36px;
            }

            .container {
                padding: 3rem 1rem;
            }

            .search-form {
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .header-title {
                font-size: 28px;
            }

            .navbar-brand {
                font-size: 24px;
            }

            .nav-links {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="navbar-container">
            <div class="navbar-brand">
                <div class="brand-icon">B</div>
                BookWorld
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/recommend">Recommend</a></li>
                <li><a href="/contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1 class="header-title">
                Get <span class="header-title-highlight">Book Recommendations</span>
            </h1>
            <p class="header-subtitle">Find your next favorite book based on your preferences</p>
        </div>

        <div class="search-form">
            <h2>Search for Books</h2>
            
            <!-- Error Message Display -->
            {% if error_message %}
            <div style="background: linear-gradient(135deg, rgba(255, 107, 107, 0.15) 0%, rgba(255, 107, 107, 0.05) 100%); border: 1px solid rgba(255, 107, 107, 0.3); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; text-align: center;">
                <p style="color: #ff6b6b; margin: 0;">{{ error_message }}</p>
            </div>
            {% endif %}
            
            <form action="/recommend_books" method="post">
                <div class="form-group">
                    <label for="bookName" class="form-label">Enter a Book Name</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="bookName"
                        name="book_name" 
                        placeholder="e.g., Harry Potter, To Kill a Mockingbird"
                        required
                        autocomplete="off"
                    >
                </div>
                <button type="submit" class="search-button">Get Recommendations</button>
            </form>
        </div>
    </div>
</body>
</html>
